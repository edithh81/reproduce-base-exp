# ============================================================
# MoKGR Configuration
# ============================================================
# Reference: MoKGR-recsys/MoKGR_RecSys/train.py
# ============================================================

training:
  seed: 1234
  gpu: 0
  epoch: 40
  tau: 1.0

# Early-stop gate
gate:
  active_gate: true
  gate_threshold: 0.1

# PPR subgraph sampling
ppr:
  active_PPR: true
  sampling_percentage: 0.8
  PPR_alpha: 0.85
  max_iter: 100
  ppr_batch_size: 64

# Mixture-of-Experts for hop selection
moe_hop:
  num_experts: 3
  lambda_importance: 1.0e-07
  lambda_load: 0.0
  lambda_noise: 1.0
  hop_temperature: 1.1

# Mixture-of-Experts for pruning
moe_pruning:
  num_pruning_experts: 2
  pruning_temperature: 1.5
  l_inflection: 3
  a: 3.0
  lambda_importance_pruning: 1.0e-07
  lambda_noise_pruning: 1.0

# Per-dataset: K_source/K_min/K_max tuned to graph density
# last-fm: ~130K nodes, 465K KG triples (denser, smaller)
# amazon-book: ~184K nodes, 2.6M KG triples (larger, sparser per entity)
datasets:
  last-fm:
    lr: 0.0004
    decay_rate: 0.994
    lamb: 0.00014
    hidden_dim: 48
    attn_dim: 5
    dropout: 0.02
    act: idd
    n_batch: 5
    n_tbatch: 5
    min_hop: 2
    max_hop: 4
    K_source: 80
    K_min: 100
    K_max: 200

  new_last-fm:
    lr: 0.0004
    decay_rate: 0.994
    lamb: 0.00014
    hidden_dim: 48
    attn_dim: 5
    dropout: 0.02
    act: idd
    n_batch: 5
    n_tbatch: 5
    min_hop: 2
    max_hop: 4
    K_source: 80
    K_min: 100
    K_max: 200

  amazon-book:
    lr: 0.0012
    decay_rate: 0.994
    lamb: 0.000014
    hidden_dim: 48
    attn_dim: 5
    dropout: 0.02
    act: idd
    n_batch: 5
    n_tbatch: 5
    min_hop: 2
    max_hop: 4
    K_source: 150
    K_min: 200
    K_max: 400

  new_amazon-book:
    lr: 0.0005
    decay_rate: 0.994
    lamb: 0.000014
    hidden_dim: 48
    attn_dim: 5
    dropout: 0.01
    act: idd
    n_batch: 5
    n_tbatch: 5
    min_hop: 2
    max_hop: 4
    K_source: 150
    K_min: 200
    K_max: 400
